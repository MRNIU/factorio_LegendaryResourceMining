LegendaryResourceMining-resource-scope-planet=Current planet
LegendaryResourceMining-resource-scope-all=All supported resources

[entity-name]
LegendaryResourceMining-placement-anchor=Legendary mining placement anchor

[entity-description]
LegendaryResourceMining-hidden-resource=Hidden mining source for __1__.
LegendaryResourceMining-placement-anchor=Temporary hidden resource used while placing a legendary big mining drill.
LegendaryResourceMining-placement-proxy=Temporary placement proxy that is immediately replaced with a vanilla big mining drill.

[message]
LegendaryResourceMining-resource-not-allowed=This planet does not allow __1__ for legendary resource mining.
LegendaryResourceMining-non-legendary-needs-resource=Non-legendary big mining drills still need a visible resource patch.
