[mod-name]
LegendaryResourceMining=传奇资源采矿

[mod-description]
LegendaryResourceMining=允许传奇品质大型采矿机在没有可见矿点时，手动选择一种有限储量资源进行采矿。

[mod-setting-name]
LegendaryResourceMining-resource-scope=可选择资源范围

[mod-setting-description]
LegendaryResourceMining-resource-scope=选择传奇大型采矿机只能选择当前星球启用的资源，还是可以选择所有受支持的物品资源。

[string-mod-setting]
LegendaryResourceMining-resource-scope-planet=当前星球
LegendaryResourceMining-resource-scope-all=全部支持资源

[entity-name]
LegendaryResourceMining-placement-anchor=传奇采矿放置锚点

[entity-description]
LegendaryResourceMining-hidden-resource=__1__ 的隐藏采矿来源。
LegendaryResourceMining-placement-anchor=放置大型采矿机时使用的临时隐藏资源。
LegendaryResourceMining-placement-proxy=临时放置代理，会被替换为原版大型采矿机。

[message]
LegendaryResourceMining-resource-not-allowed=当前星球不允许传奇资源采矿选择 __1__。
LegendaryResourceMining-non-legendary-needs-resource=非传奇大型采矿机仍然需要放在可见资源矿点上。
LegendaryResourceMining-filter-apply-failed=无法为 __1__ 应用隐藏采矿筛选器。
LegendaryResourceMining-hidden-resource-create-failed=无法为 __1__ 创建隐藏采矿资源。
LegendaryResourceMining-drill-create-failed=无法在这里创建大型采矿机。
